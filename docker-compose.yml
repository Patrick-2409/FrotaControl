services:
  postgres:
    image: postgres:16
    container_name: frotacontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frotacontrol
    ports:
      - "5433:5432"
    volumes:
      - frotacontrol_pgdata:/var/lib/postgresql/data

volumes:
  frotacontrol_pgdata:
